services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      POLL_INTERVAL_MS: "1000"
      ADS_SOURCE: https://api.airplanes.live/v2/point
      PORT: "3001"
    depends_on:
      - redis

  frontend:
    build:
      context: .
      args:
        VITE_BACKEND_URL: https://skywatch.test
    restart: unless-stopped
    depends_on:
      - backend
